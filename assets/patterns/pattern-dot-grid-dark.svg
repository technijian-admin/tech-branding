<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <title>Technijian Dot Grid Pattern - Dark</title>
  <!-- Technijian Dot Grid Pattern - Dark variant for dark backgrounds -->
  <defs>
    <pattern id="technijian-grid-dark" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect x="4" y="4" width="32" height="32" rx="5" ry="5" fill="#006DB6" opacity="0.15"/>
      <rect x="44" y="4" width="32" height="32" rx="5" ry="5" fill="#1EAAC8" opacity="0.12"/>
      <rect x="4" y="44" width="32" height="32" rx="5" ry="5" fill="#F67D4B" opacity="0.12"/>
      <rect x="44" y="44" width="32" height="32" rx="5" ry="5" fill="#CBDB2D" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#technijian-grid-dark)"/>
</svg>
