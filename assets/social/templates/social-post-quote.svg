<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Technijian Social Post - Testimonial Template</title>
  <!-- Technijian Social Post Template: Client Testimonial -->
  <rect width="1200" height="630" fill="#F8F9FA"/>
  <!-- Large decorative quote mark -->
  <text x="60" y="180" font-family="Georgia, serif" font-size="200" fill="#006DB6" opacity="0.1">"</text>
  <!-- Quote text -->
  <text x="100" y="230" font-family="Open Sans, sans-serif" font-size="28" fill="#1A1A2E" font-style="italic" line-height="1.5">
    <tspan x="100" dy="0">Client testimonial quote goes</tspan>
    <tspan x="100" dy="42">here. Keep it impactful and</tspan>
    <tspan x="100" dy="42">focused on results.</tspan>
  </text>
  <!-- Orange divider -->
  <rect x="100" y="380" width="60" height="4" fill="#F67D4B"/>
  <!-- Attribution -->
  <text x="100" y="420" font-family="Open Sans, sans-serif" font-size="18" fill="#1A1A2E" font-weight="700">Client Name</text>
  <text x="100" y="446" font-family="Open Sans, sans-serif" font-size="15" fill="#59595B">Title, Company Name</text>
  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="#1A1A2E"/>
  <text x="60" y="590" font-family="Open Sans, sans-serif" font-size="18" fill="#FFFFFF" font-weight="600" letter-spacing="1">
    <tspan font-size="22">T</tspan><tspan font-size="16" letter-spacing="2">ECHNIJIAN</tspan>
  </text>
  <text x="1140" y="590" font-family="Open Sans, sans-serif" font-size="12" fill="#ADB5BD" text-anchor="end">technijian.com | 949.379.8500</text>
</svg>
