<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Technijian Social Post - Tech Tip Template</title>
  <!-- Technijian Social Post Template: Tech Tip -->
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#1EAAC8"/>
  <!-- Category label -->
  <rect x="60" y="50" width="120" height="32" rx="4" fill="#1EAAC8" opacity="0.12"/>
  <text x="120" y="72" font-family="Open Sans, sans-serif" font-size="13" fill="#1EAAC8" text-anchor="middle" font-weight="600" letter-spacing="2">TECH TIP</text>
  <!-- Tip number -->
  <text x="60" y="170" font-family="Open Sans, sans-serif" font-size="80" fill="#006DB6" font-weight="700" opacity="0.12">#01</text>
  <!-- Main title -->
  <text x="60" y="240" font-family="Open Sans, sans-serif" font-size="36" fill="#1A1A2E" font-weight="700">
    <tspan x="60" dy="0">Your Tech Tip Title</tspan>
    <tspan x="60" dy="48">Goes Here</tspan>
  </text>
  <!-- Body text -->
  <text x="60" y="340" font-family="Open Sans, sans-serif" font-size="18" fill="#59595B" line-height="1.5">
    <tspan x="60" dy="0">Brief explanation of the tip. Keep it actionable and</tspan>
    <tspan x="60" dy="28">practical. One or two sentences maximum.</tspan>
  </text>
  <!-- Divider -->
  <rect x="60" y="420" width="80" height="3" fill="#F67D4B"/>
  <!-- Bottom area -->
  <rect x="0" y="530" width="1200" height="100" fill="#F8F9FA"/>
  <text x="60" y="585" font-family="Open Sans, sans-serif" font-size="18" fill="#006DB6" font-weight="600" letter-spacing="1">
    <tspan font-size="22">T</tspan><tspan font-size="16" letter-spacing="2">ECHNIJIAN</tspan>
  </text>
  <text x="1140" y="585" font-family="Open Sans, sans-serif" font-size="13" fill="#59595B" text-anchor="end">technology as a solution</text>
</svg>
