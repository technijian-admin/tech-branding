<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Technijian Social Post - Announcement Template</title>
  <!-- Technijian Social Post Template: Announcement -->
  <rect width="1200" height="630" fill="#1A1A2E"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#006DB6"/>
  <!-- Content area -->
  <rect x="60" y="80" width="1080" height="400" rx="8" fill="#FFFFFF" opacity="0.05"/>
  <!-- Icon placeholder circle -->
  <circle cx="120" cy="180" r="36" fill="#006DB6" opacity="0.2"/>
  <text x="120" y="188" font-family="Open Sans, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">!</text>
  <!-- Headline -->
  <text x="180" y="188" font-family="Open Sans, sans-serif" font-size="16" fill="#1EAAC8" font-weight="600" letter-spacing="3">ANNOUNCEMENT</text>
  <!-- Main title -->
  <text x="80" y="280" font-family="Open Sans, sans-serif" font-size="40" fill="#FFFFFF" font-weight="700">
    <tspan x="80" dy="0">Your Headline Goes</tspan>
    <tspan x="80" dy="52">Here In Two Lines</tspan>
  </text>
  <!-- Subtitle -->
  <text x="80" y="400" font-family="Open Sans, sans-serif" font-size="18" fill="#ADB5BD">
    Supporting text or call to action goes here. Keep it brief.
  </text>
  <!-- CTA button -->
  <rect x="80" y="440" width="180" height="44" rx="6" fill="#F67D4B"/>
  <text x="170" y="468" font-family="Open Sans, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">Learn More</text>
  <!-- Bottom bar with logo -->
  <rect x="0" y="540" width="1200" height="90" fill="#006DB6" opacity="0.15"/>
  <!-- Logo wordmark -->
  <text x="80" y="595" font-family="Open Sans, sans-serif" font-size="20" fill="#FFFFFF" font-weight="600" letter-spacing="1">
    <tspan font-size="24">T</tspan><tspan font-size="18" letter-spacing="2">ECHNIJIAN</tspan>
  </text>
  <text x="1120" y="595" font-family="Open Sans, sans-serif" font-size="12" fill="#ADB5BD" text-anchor="end">technijian.com</text>
</svg>
