<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Technijian Social Post - Team Spotlight Template</title>
  <!-- Technijian Social Post Template: Team Member Spotlight -->
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Left half: photo placeholder -->
  <rect x="0" y="0" width="500" height="630" fill="#E9ECEF"/>
  <text x="250" y="300" font-family="Open Sans, sans-serif" font-size="16" fill="#ADB5BD" text-anchor="middle">Photo</text>
  <text x="250" y="325" font-family="Open Sans, sans-serif" font-size="12" fill="#ADB5BD" text-anchor="middle">500 x 630px</text>
  <!-- Right half: content -->
  <!-- Label -->
  <rect x="550" y="80" width="180" height="30" rx="4" fill="#006DB6" opacity="0.1"/>
  <text x="640" y="101" font-family="Open Sans, sans-serif" font-size="12" fill="#006DB6" text-anchor="middle" font-weight="600" letter-spacing="2">TEAM SPOTLIGHT</text>
  <!-- Name -->
  <text x="550" y="200" font-family="Open Sans, sans-serif" font-size="36" fill="#1A1A2E" font-weight="700">Team Member</text>
  <text x="550" y="236" font-family="Open Sans, sans-serif" font-size="36" fill="#1A1A2E" font-weight="700">Name</text>
  <!-- Title -->
  <text x="550" y="280" font-family="Open Sans, sans-serif" font-size="18" fill="#006DB6">Job Title</text>
  <!-- Orange accent -->
  <rect x="550" y="305" width="60" height="3" fill="#F67D4B"/>
  <!-- Bio/quote -->
  <text x="550" y="350" font-family="Open Sans, sans-serif" font-size="15" fill="#59595B">
    <tspan x="550" dy="0">Brief bio or quote from the team</tspan>
    <tspan x="550" dy="24">member. What they love about</tspan>
    <tspan x="550" dy="24">working at Technijian or their</tspan>
    <tspan x="550" dy="24">area of expertise.</tspan>
  </text>
  <!-- Bottom bar -->
  <rect x="500" y="530" width="700" height="100" fill="#F8F9FA"/>
  <text x="550" y="588" font-family="Open Sans, sans-serif" font-size="16" fill="#006DB6" font-weight="600" letter-spacing="1">
    <tspan font-size="20">T</tspan><tspan font-size="14" letter-spacing="2">ECHNIJIAN</tspan>
  </text>
  <text x="1150" y="588" font-family="Open Sans, sans-serif" font-size="11" fill="#59595B" text-anchor="end">We're hiring! technijian.com/careers</text>
</svg>
