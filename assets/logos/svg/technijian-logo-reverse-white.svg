<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <title>Technijian Logo - Reverse White</title>
  <!-- Technijian Full Logo - Reverse White (for dark backgrounds) -->

  <!-- DOT GRID ICON - all white -->
  <g transform="translate(0, 0)">
    <rect x="2" y="2" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="42" y="2" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="82" y="2" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="122" y="2" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="2" y="42" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="42" y="42" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="82" y="42" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="122" y="42" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="2" y="82" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="42" y="82" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="82" y="82" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="122" y="82" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="2" y="122" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="42" y="122" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="82" y="122" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
    <rect x="122" y="122" width="34" height="34" rx="6" ry="6" fill="#FFFFFF"/>
  </g>

  <!-- WORDMARK - white -->
  <text x="185" y="120" font-family="'Open Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="130" fill="#FFFFFF" letter-spacing="2">
    <tspan font-size="140" font-weight="600">T</tspan><tspan font-size="105" letter-spacing="6">ECHNIJIAN</tspan>
  </text>

  <!-- TAGLINE - white -->
  <text x="185" y="165" font-family="'Open Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="28" fill="#FFFFFF" letter-spacing="10">
    t e c h n o l o g y    a s    a    s o l u t i o n
  </text>
</svg>
