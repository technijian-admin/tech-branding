<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" width="2550" height="3300">
  <title>Technijian IT Services Pvt. Ltd. (India) — Letterhead</title>
  <!-- Technijian India Letterhead Template -->
  <!-- 8.5" x 11" at 300dpi = 2550 x 3300 pixels -->
  <!-- Brand colours: Core Blue #006DB6, Core Orange #F67D4B, Dark Charcoal #1A1A2E, Brand Grey #59595B -->

  <!-- White background -->
  <rect width="2550" height="3300" fill="#FFFFFF"/>

  <!-- Header: Logo (top-left) -->
  <text x="225" y="180" font-family="Open Sans, sans-serif" font-size="48" font-weight="700" fill="#6D6E71" letter-spacing="2">
    <tspan font-size="56" font-weight="600">T</tspan><tspan font-size="40" letter-spacing="3">ECHNIJIAN</tspan>
  </text>
  <text x="225" y="210" font-family="Open Sans, sans-serif" font-size="13" fill="#006DB6" letter-spacing="5">
    technology as a solution
  </text>

  <!-- Header: India entity name and address (top-right) -->
  <text x="2325" y="160" font-family="Open Sans, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E" text-anchor="end">
    TECHNIJIAN IT SERVICES PVT. LTD.
  </text>
  <text x="2325" y="185" font-family="Open Sans, sans-serif" font-size="12" fill="#59595B" text-anchor="end">
    Twin Tower, Plot no 7, Sector 22
  </text>
  <text x="2325" y="205" font-family="Open Sans, sans-serif" font-size="12" fill="#59595B" text-anchor="end">
    IT Park, Panchkula 134109, Haryana, India
  </text>
  <text x="2325" y="225" font-family="Open Sans, sans-serif" font-size="12" fill="#006DB6" text-anchor="end">
    technijian.com  |  india@technijian.com
  </text>

  <!-- Blue line under header -->
  <rect x="225" y="245" width="2100" height="3" fill="#006DB6"/>
  <!-- Orange accent (under blue line) -->
  <rect x="225" y="248" width="2100" height="6" fill="#F67D4B"/>

  <!-- Body text start marker (delete in production use) -->
  <text x="225" y="650" font-family="Open Sans, sans-serif" font-size="24" fill="#CCCCCC" opacity="0.5">
    [Letter content starts here — delete this placeholder]
  </text>

  <!-- Footer: thin blue bar -->
  <rect x="225" y="3080" width="2100" height="2" fill="#006DB6"/>

  <!-- Footer text line 1: service pillars -->
  <text x="1275" y="3115" font-family="Open Sans, sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle" font-weight="600">
    TECHNIJIAN  |  Managed IT  -  Cybersecurity  -  Cloud  -  AI Development  -  Compliance
  </text>

  <!-- Footer text line 2: India address -->
  <text x="1275" y="3140" font-family="Open Sans, sans-serif" font-size="10" fill="#59595B" text-anchor="middle">
    Technijian IT Services Pvt. Ltd.  |  Twin Tower, Plot no 7, Sector 22, IT Park, Panchkula 134109, Haryana, India
  </text>

  <!-- Footer text line 3: contact / website -->
  <text x="1275" y="3160" font-family="Open Sans, sans-serif" font-size="10" fill="#59595B" text-anchor="middle">
    india@technijian.com  |  technijian.com
  </text>

  <!-- Footer text line 4: U.S. parent / global note -->
  <text x="1275" y="3180" font-family="Open Sans, sans-serif" font-size="9" fill="#59595B" text-anchor="middle" font-style="italic">
    U.S. Parent: Technijian, 18 Technology Dr., Ste 141, Irvine, CA 92618  |  +1.949.379.8500
  </text>

  <!-- Confidentiality stamp area (top-right corner, very subtle) -->
  <text x="2325" y="3275" font-family="Open Sans, sans-serif" font-size="9" fill="#59595B" text-anchor="end" opacity="0.6">
    CONFIDENTIAL
  </text>

  <!-- Orange accent at very bottom (matches U.S. letterhead style) -->
  <rect x="0" y="3285" width="2550" height="15" fill="#F67D4B"/>
</svg>
