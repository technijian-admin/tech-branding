<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <title>Technijian Business Card - Back</title>
  <!-- Technijian Business Card - Back -->
  <!-- 3.5" x 2" at 300dpi = 1050 x 600 pixels -->

  <!-- Dark Charcoal background -->
  <rect width="1050" height="600" fill="#1A1A2E"/>

  <!-- Dot grid icon (centered, simplified) -->
  <g transform="translate(430, 180) scale(0.8)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="44" height="44" rx="7" fill="#59595B"/>
    <rect x="52" y="0" width="44" height="44" rx="7" fill="#006DB6"/>
    <rect x="104" y="0" width="44" height="44" rx="7" fill="#59595B"/>
    <rect x="156" y="0" width="44" height="44" rx="7" fill="#F67D4B"/>
    <!-- Row 2 -->
    <rect x="0" y="52" width="44" height="44" rx="7" fill="#006DB6"/>
    <rect x="52" y="52" width="44" height="44" rx="7" fill="#59595B"/>
    <rect x="104" y="52" width="44" height="44" rx="7" fill="#F67D4B"/>
    <rect x="156" y="52" width="44" height="44" rx="7" fill="#59595B"/>
    <!-- Row 3 -->
    <rect x="0" y="104" width="44" height="44" rx="7" fill="#006DB6"/>
    <rect x="52" y="104" width="44" height="44" rx="7" fill="#1EAAC8"/>
    <rect x="104" y="104" width="44" height="44" rx="7" fill="#F67D4B"/>
    <rect x="156" y="104" width="44" height="44" rx="7" fill="#59595B"/>
    <!-- Row 4 -->
    <rect x="0" y="156" width="44" height="44" rx="7" fill="#CBDB2D"/>
    <rect x="52" y="156" width="44" height="44" rx="7" fill="#1EAAC8"/>
    <rect x="104" y="156" width="44" height="44" rx="7" fill="#1EAAC8"/>
    <rect x="156" y="156" width="44" height="44" rx="7" fill="#59595B"/>
  </g>

  <!-- Tagline -->
  <text x="525" y="420" font-family="Open Sans, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="6" opacity="0.7">
    TECHNOLOGY AS A SOLUTION
  </text>
</svg>
